# Constellation Map — Layer 1 Entity Bridging Data
#
# Batch-pre-computed mapping from each gold/mapped entity to its semantically
# related unmapped entities. Consumed by the Entity Bridging system's Layer 1
# matcher when a photographed entity is NOT in the IB mind map.
#
# Design authority: docs/plans/2026-04-08-entity-bridging.md §Layer 1 (the
# `Constellation Table` at lines 48–67). This file encodes that table.
#
# Matcher contract:
#   Given an unmapped entity E from a photo, look up entries where E appears
#   in `constellation`. If multiple matches exist, prefer entries whose
#   `bridge_strength` is higher. Use `bridge_prompt_pattern` (with `[entity]`
#   replaced) as the conversational bridge. Route the resulting game to
#   `pillar` + `category` of the matched mapped entity. Never bridge across
#   categories (Cat1 entity must not route to a Cat5 gold, and vice versa).
#
# Per-entry fields:
#   mapped_entity          — the known (gold or legacy) entity to bridge toward
#   category               — 1 (in-device) or 5 (out-of-device); matches the
#                            mapped entity's gold/legacy design's category
#   pillar                 — Experience Pillar (null if legacy entity without a
#                            rewritten gold-standard yet)
#   gold_standard          — path to the gold-standard design file (null if legacy)
#   bridge_type            — semantic relation between mapped and constellation
#                            (see entity-bridging §Bridge Types Reference)
#   bridge_strength        — very_strong | strong | moderate | weak
#                            (determines matcher preference when multiple hit)
#   bridge_prompt_pattern  — AI utterance template; `[entity]` is the child's
#                            actual photographed entity
#   constellation          — unmapped entities that bridge to this mapped entity
#
# Adaptation guidance (how to swap `[entity]` into each round of the game) lives
# in each gold-standard design file's `constellation_notes` block, NOT here.
# See entity-bridging §"Changes to Existing Gold Standards" for that format.

