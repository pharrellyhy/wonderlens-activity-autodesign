activity_id: concept_word_build_guess_probe
entity_id: word_build_guess
version: 1
style_id: wonderlens_device_mint_soft_3d
palette:
  shell: warm porcelain off-white
  screen: barely tinted white
  primary_accent: muted sage green
  secondary_accent: soft terracotta salmon
  shadow: pale lavender gray
screen_targets:
  round_device_screen:
    aspect_ratio: '1:1'
    crop_shape: circle
    master_size: 512
    safe_area: central 72 percent circle
assets:
- id: word_growth_ui_01
  role: ui_overlay
  label: Show a constructive word reveal surface for letter or clue guesses.
  requiredness: required
  accuracy_mode: illustrative
  source_strategy: generated_illustrative
  transformation_policy: generate_new
  prompt_en: 'Use case: illustration-story. Asset type: WonderLens runtime activity
    asset. Primary request: Show a constructive word reveal surface for letter or
    clue guesses.. Style: Flat Nordic children''s illustration matching the quiet
    white WonderLens prototype; broad flat color fills, sparse pencil texture, muted
    sage, dusty teal-blue, soft terracotta, oatmeal, ochre, blush; square 512x512
    source art with important detail inside the central circular safe area; no readable
    text, letters, numbers, labels, logos, watermark, border, contact sheet, device
    frame, circular mask, or vignette.'
  variants:
  - id: round_512
    target: round_device_screen
    size: 512x512
    path: assets/word_growth_ui_01__round_512.png
  fallback_behavior: If word state is unsupported, block at Phase 0 or run a voice-only
    clue riddle with no letter UI claims.
