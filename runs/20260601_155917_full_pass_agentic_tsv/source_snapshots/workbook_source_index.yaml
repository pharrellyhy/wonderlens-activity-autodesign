- source_row: 30
  activity_name: Trivia Game
  source_ref: source_trivia_game
  activity_id: concept_trivia_game_remember
  category: Cat 1. 纯语音（含屏幕显示及互动）
  scene: 室内,户外
  mechanic: 9. 记忆/回顾 Remember/Recall/Repeat
  screen_dependency: 中
  description: 经典玩法，可以复用到各种不同的类别、物体等。总体流程都是结合孩子拍摄/问的东西进行一小段内容输出，然后用“小测试”的形式，让孩子回顾讲过的内容。但是避免“测试”的压力感，可以用充满趣味和挑战的形式。讲述的内容可以有两种思路：1）纯知识类的，2）故事性的，趣味性的。针对2），测试也是充满“好玩感”的
  notes: 可以考虑配合图片展示（内容输出的时候）。同时，孩子测试的时候，可以考虑有一种“积累”的奖励感。比如，每答对一道题，就搭建一个城堡的一部分；答不对就不搭建，继续。可以让孩子一直进行直到城堡搭建完成。
- source_row: 31
  activity_name: 打鼹鼠变形
  source_ref: source_whack_a_mole_recognition
  activity_id: concept_recognition_pop_probe
  category: Cat 1. 纯语音（含屏幕显示及互动）
  scene: 室内,户外
  mechanic: 2. 比较/对比 Compare/Contrast
  screen_dependency: 高
  description: 传统的“打鼹鼠”游戏的变形。比如孩子拍摄了狗，在介绍的时候就扩展介绍几个跟狗长相近似的动物（比如狐狸，狼）。然后给孩子挑战，练习展示一些真实的动物的照片，混合狗，狐狸，狼。每当展示“狗”的时候，让孩子说出“dog”。其他时候安静。
  notes: 类似的玩法可以拓展到很多品类。主要训练孩子识别物体间的差别。大一点的孩子也可以挑战不同的狗的种类，比如金毛等
- source_row: 32
  activity_name: Hangman 猜词游戏
  source_ref: source_word_build_guess
  activity_id: concept_word_build_guess_probe
  category: Cat 1. 纯语音（含屏幕显示及互动）
  scene: 室内,户外
  mechanic: 10. 语言/叙事 Imagine/Narrate/Pretend/Roleplay/Retell/Summarize
  screen_dependency: 高
  description: 传统的凑字母拼单词游戏（参考：https://play.google.com/store/apps/details?id=com.tellmewow.senior.hangman&hl=en_US），让孩子说出字母，直到整个单词拼凑完成。单词需要跟孩子拍摄/问的物体有关
  notes: 注意设计上不要采用hangman的原型，用一个更温馨可爱的表达（比如从一个小树苗长成一个大树）
- source_row: 33
  activity_name: Would you rather
  source_ref: source_would_you_rather
  activity_id: concept_would_you_rather_compare
  category: Cat 1. 纯语音（含屏幕显示及互动）
  scene: 室内,户外
  mechanic: 2. 比较/对比 Compare/Contrast
  screen_dependency: 低
  description: 这种一种非常经典的玩法，主要用语音的形式，连续问问题，让孩子二选一。这种玩法中可以带有非常强的趣味性（搞笑的感觉）。比如Would you
    rather brush your teeth with ketchup, or wash your hair with chocolate milk?
  notes: 注意问题不要太长
- source_row: 34
  activity_name: 艺术鉴赏家
  source_ref: source_art_critic_tournament
  activity_id: concept_art_critic_tournament_probe
  category: Cat 1. 纯语音（含屏幕显示及互动）
  scene: 室内,户外
  mechanic: 2. 比较/对比 Compare/Contrast
  screen_dependency: 高
  description: 类似“冒泡算法”和擂台，每次都给孩子两个艺术作品，让孩子选择自己想对更喜欢的。胜者保留，进入下一轮，跟新的一个作品比较。差不多一共5轮，最终选出胜利者
  notes: 1. 可以考虑结合滚轮操作；2. 艺术作品很多博物馆都有免费接口；3. 这种比较选优的方法可以复用到很多其他的类别（不限于艺术作品）
- source_row: 35
  activity_name: 通过颜色看名画
  source_ref: source_color_in_famous_art
  activity_id: concept_color_famous_art_probe
  category: Cat 1. 纯语音（含屏幕显示及互动）
  scene: 室内,户外
  mechanic: 1. 识别/计数 Enumerate/Identify/Count/Measure
  screen_dependency: 高
  description: 通过孩子拍摄的颜色，给孩子看几个以这个颜色为主体的艺术作品（比如梵高的向日葵就是黄色），然后简单介绍一下艺术作品的背景
  notes: 艺术作品很多博物馆都有免费API接口，同时有颜色标签
- source_row: 36
  activity_name: 简单的肢体动作引导
  source_ref: source_simple_body_movement
  activity_id: concept_body_movement_probe
  category: Cat 1. 纯语音（含屏幕显示及互动）
  scene: 室内
  mechanic: 12. 动作/声音 Motion/Voice
  screen_dependency: 中
  description: 比如模仿一些动物的动作，屏幕上展示相关的图片（可以是AI生图，这样动作更夸张明显一点），然后让孩子模仿。限于简单的拉伸，举手，趴着等动作
  notes: 不用检测，不用评价，重在过程
- source_row: 37
  activity_name: 时事评论
  source_ref: source_current_topic_interview
  activity_id: concept_current_topic_interview_deduce
  category: Cat 1. 纯语音（含屏幕显示及互动）
  scene: 室内,户外
  mechanic: 5. 推理/演绎 Deduce/Infer/Conclude/Justify
  screen_dependency: 低
  description: 针对大一点的孩子，可以通过孩子拍摄的物体或者问的问题引发一个带有一点“社会性”问题的背景介绍。然后通过一点“小采访”的形式，让孩子说出自己的观点。除了社会性问题，也可以考虑找一些纯“搞笑的”的问题，主要就是让孩子有自己的想法，辩证看问题
  notes: 不用太复杂，可以从“儿童辩论题”里面找灵感。孩子的观点也没有对错。因此AI的回复不用有太强的“评价感”，也不用太给“情绪价值”，就是辩证、讨论的感觉
- source_row: 38
  activity_name: 生成小诗歌
  source_ref: source_little_poem_generator
  activity_id: concept_little_poem_build
  category: Cat 1. 纯语音（含屏幕显示及互动）
  scene: 室内,户外
  mechanic: 6. 搭建/创意 Build/Create/Assemble/Transform/Experiment/Invent
  screen_dependency: 低
  description: 孩子都喜欢有韵律（Rhyme）的东西，AI也有这个生成能力。结合孩子拍摄的东西，可以生成一首小诗（可以温馨，可以搞笑），读给孩子听，也算是孩子的一个小成就
  notes: 要结合孩子的东西，这样孩子有“参与感”，算是跟孩子的“共创”
- source_row: 39
  activity_name: 帮XX计划旅行
  source_ref: source_travel_planner
  activity_id: concept_travel_planner_predict
  category: Cat 1. 纯语音（含屏幕显示及互动）
  scene: 室内,户外
  mechanic: 7. 预测/计划 Predict/Hypothesize/Plan
  screen_dependency: 中
  description: 让孩子理解计划，也是项目制学习的初探。假设孩子拍摄的小玩偶要去旅行，让孩子参与计划小玩偶要带什么东西。比如天气要下雨，决定要不要带伞。
  notes: 不一定限于“旅行”，可以在任何场景设计一个“计划”游戏。但尽量与真实生活体验有关
- source_row: 40
  activity_name: Quick and silly quesitons
  source_ref: source_quick_silly_questions
  activity_id: concept_quick_silly_decide
  category: Cat 1. 纯语音（含屏幕显示及互动）
  scene: 室内,户外
  mechanic: 8. 选择/决策 Decide/Choose/Correct
  screen_dependency: 低
  description: 跟知识无关，就是快速二选一或者Yes/No游戏。大约连贯5-7个游戏，每个问题后可以考虑屏幕显示 321 倒计时（不用配合音效）。趣味为主，问题可以silly。跟would
    you rather 的区别是这种问题都短平快，需要快速反应。比如“cat or dog""purple or pink"
  notes: 可以考虑整体配合一点鼓点感的音效，营造紧张快速的氛围。AI也要稍微加快一点语速，像快速提问的主持人语气。问题要简单 好玩
