recap_payload:
  entity: "{runtime_entity}"
  tier: "{runtime_tier}"
  age_years: "{runtime_age}"

  what_we_noticed: function
  what_we_did: deduced
  entity_role: catalyst

  focal_attribute:
    token: "clue_evidence"
    child_label: "clue evidence"
    badge_emoji_none: true

  highlight_moment: "You used three clues to solve the mystery."

  clue_trail:
    - "{clue_1}"
    - "{clue_2}"
    - "{clue_3}"
  answer: "{mystery_answer}"

  difficulty_level: 2
  next_step_hint: "Next time, explain which clue helped most."

  caregiver_observed: co-explorer
  reward_badge: clue_detective

rendered:
  title: "You were a Clue Detective today!"
  line_1: "You listened to the clues."
  line_2: "You changed your guess when evidence grew."
  line_3: "You solved the mystery answer: {mystery_answer}."
  badge: "Clue Detective"
  next: "Next time, explain which clue helped most."
