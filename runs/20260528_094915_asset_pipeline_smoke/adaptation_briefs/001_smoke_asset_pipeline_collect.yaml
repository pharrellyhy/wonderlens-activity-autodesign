assignment_index: 1
activity_id: smoke_asset_pipeline_collect
activity_concept: Asset Pipeline Smoke
input_mode: concept_only
readiness: generate
canonical_mechanic: collect
category: cat5
tier: T1
trigger_condition: Operator selects the asset pipeline smoke test.
source_promise_alignment:
  original_play_frame: Purpose-built smoke assignment for asset pipeline validation.
  child_role: Moss explorer who captures one real-world clue, collects one token, and opens a constellation reward card.
  interaction_sequence:
  - Meet the moss explorer mission.
  - Look for the soft moss token on screen.
  - Capture one real-world object or texture that shares a moss clue.
  - Say one visible matching clue to collect it.
  - Open the accurate Orion reward card.
  - Close with one remembered thing.
  required_child_actions:
  - Capture one real-world clue photo.
  - Name or point to one matching moss detail.
  - Answer one simple clue about the Orion card.
  non_negotiable_elements:
  - Separate illustrative moss token runtime asset.
  - Separate reference-bound Orion runtime asset with accepted source metadata.
  allowed_v1_adaptations:
  - The collection is intentionally limited to one camera capture for smoke scope.
  product_dependencies:
  - Cat5 collection UI with real camera capture.
  - Package-local generated assets.
  alignment_status: aligned
asset_dependency:
  asset_policy: required_prebuilt
  asset_build: generate_and_curate
  assets:
  - asset_id: moss_token
    accuracy_mode: illustrative
    source_strategy: generated_illustrative
    transformation_policy: generate_new
  - asset_id: orion_card
    accuracy_mode: reference_bound
    source_strategy: licensed_reference
    transformation_policy: crop_resize_only
demo_support:
  status: supported
  ui_template: cat5_collection
  entity_binding: moss
review_notes:
- This smoke intentionally combines illustrative and reference-bound assets in one Cat5 camera collection package so consumer import can test both paths with a single activity.
