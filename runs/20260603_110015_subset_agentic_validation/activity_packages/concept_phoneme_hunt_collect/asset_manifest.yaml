- id: activity_icon
  role: activity_preview
  label: Activity icon for B-Sound Treasure Hunt.
  requiredness: required
  accuracy_mode: illustrative
  source_strategy: generated_illustrative
  transformation_policy: generate_new
  prompt_en: 'Use case: illustration-story. Asset type: WonderLens full-pass runtime
    activity asset. Primary request: Activity icon for B-Sound Treasure Hunt. Composition:
    single centered icon or badge on a clean white background, no app UI; generate
    a 512x512 square source PNG; if the image tool returns a larger square, downsample
    it to 512x512 before asset build; keep important details inside the central round-lens
    safe area. Activity-specific direction: use neutral treasure-hunt/search imagery
    such as a listening spot, soft treasure path, empty basket, or camera clue slot;
    do not reveal target objects before the child supplies evidence. Style: flat Nordic
    children''s illustration matching the quiet white WonderLens prototype; broad
    flat color fills, sparse arc-eye or tiny texture linework, light colored-pencil
    grain, restrained boho pastels, airy negative space, organic simple silhouettes.
    No readable text, letters, numbers, labels, logos, watermark, border, contact
    sheet, multi-card sheet, device frame, circular mask, vignette, black corners,
    glossy eyes, chibi toy look, hard shadows, or clutter. Do not draw progress dots,
    round markers, response slots, rule strips, buttons, chips, picker slots, badges,
    or other app-owned interface state; the runtime overlays those separately.'
  variants:
  - id: round_512
    target: round_device_screen
    size: 512x512
    path: assets/activity_icon__round_512.png
  fallback_behavior: If this beat asset is unavailable, degrade the demo screen and
    do not claim that the missing visual is displayed.
