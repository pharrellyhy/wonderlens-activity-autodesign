activity_id: concept_scavenger_hunt_collect
version: 1
parameterization:
  mode: property_target
  decision_source: current_package_review
  integrity_status: degraded_child_stated_property_target
  confidence: medium
  evidence:
    - The package asks for a shared clue object and preserves a three-photo collection plus synthesis loop.
    - Demo support says arbitrary color, shape, or category cannot be judged reliably from image data alone.
  validity:
    production_supported: false
    requires:
      - handoff object label
      - child or caregiver stated shared property
      - child or caregiver stated evidence for each collected photo
    invalid_when:
      - no shared property is stated
      - runtime claims automated image judgment of arbitrary properties
      - fewer than three collection examples are available
  source_fields:
    seed_object:
      - handoff.object_label
      - demo_support.default_entity_binding.display_label
    shared_property:
      - child_stated_property
      - caregiver_confirmed_property
  derived_runtime_fields:
    target_property: child_or_caregiver_stated_shared_property
    collection_goal_count: 3
    evidence_prompt: explain how each photo shares the clue
  authored_constants:
    collection_loop: three-photo scavenger hunt with synthesis
  fallback_behavior: Degrade to child-stated evidence; do not claim automated recognition of color, shape, or category.
  consumer_notes:
    wonderlens_ai: Require explicit property evidence before accepting collection items.
  reviewer_action: accept_only_as_degraded_property_target
demo_support:
  status: degraded
  ui_template: cat5_judgment
  support_level: catalog_simulated_judgment
  entity_bindings:
  - entity_id: shared_clue_object
    display_label: Shared Clue Object
    source_entity_exemplar: shared clue object
    default: true
  requires:
    generated_assets: true
    real_camera: true
    runtime_judgment: true
    device_round_screen: true
  unsupported_reasons: []
  degraded_reasons:
  - The current demo cannot reliably judge arbitrary shared color, shape, or category
    from image data alone.
  - The package accepts child-stated evidence and preserves the three-photo collection
    plus synthesis loop.
  consumer_notes:
    fullstack_demo: Use deterministic runtime/fullstack export or parse generated
      markdown; do not use LLM conversion as proof of no rewrite.
    wonderlens_ai: Convert prod.md with scripts/generate_activity_runtime.py and preserve
      demo_support gating.
