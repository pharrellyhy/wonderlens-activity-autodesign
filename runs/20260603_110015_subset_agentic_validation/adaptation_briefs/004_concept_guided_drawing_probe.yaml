adaptation_brief:
  input_mode: concept_only
  core_promise: The child draws on real paper while the AI gives step cards and waits
    for self-report; no camera verification is claimed.
  source_promise_alignment:
    original_play_frame: AI guides the child to use paper and pencil to complete a
      simple drawing step by step, then celebrates the process.
    child_role: child completes the source activity action directly
    interaction_sequence:
    - Draw The First Circle
    - Add Two Small Ears Or Petals
    - Finish With One Face Or Detail
    required_child_actions:
    - build
    - respond to source evidence
    non_negotiable_elements:
    - AI guides the child to use paper and pencil to complete a simple drawing step
      by step, then celebrates the process.
    allowed_v1_adaptations: &id001
    - The package represents V1 behavior as voice/text-guided paper drawing with child
      or caregiver self-report.
    - It makes no visual assessment, no photo-verification claim, and no automated
      quality judgment.
    product_dependencies:
    - generated_assets
    - device_round_screen
    alignment_status: minor_adaptation
    alignment_note: Generated package keeps the workbook play frame and records any
      V1 limitation in demo_support.yaml.
  canonical_mechanic: build
  mechanic_confidence: high
  category_decision: cat3
  readiness: generate_with_assumptions
  trigger_condition: Child is indoors and has paper and pencil ready for a guided
    sketch.
  entity_role: reference
  observation_angle: shape
  focal_attribute: drawing step sequence
  mapping_use:
    required: false
    available: false
    value_if_available: []
    missing_mapping_risk: none
  product_capability_flags:
  - generated_assets
  - device_round_screen
  asset_dependency:
