adaptation_brief:
  input_mode: parameterized
  core_promise: The target sound becomes the collection criterion; visual objects
    support but do not replace spoken or typed name evidence.
  source_promise_alignment:
    original_play_frame: AI introduces a target sound, then the child finds one indoor
      treasure whose word starts with that sound.
    child_role: child completes the source activity action directly
    interaction_sequence:
    - Hear The Target Sound
    - Capture One Treasure
    - Name Evidence Check
    required_child_actions:
    - collect
    - respond to source evidence
    non_negotiable_elements:
    - AI introduces a target sound, then the child finds one indoor treasure whose
      word starts with that sound.
    allowed_v1_adaptations: &id001
    - The current demo cannot infer the starting sound of a photographed object from
      image data alone.
    - The package requires the child to say or enter the object name before accepting
      sound evidence.
    product_dependencies:
    - generated_assets
    - real_camera
    - runtime_judgment
    - device_round_screen
    alignment_status: minor_adaptation
    alignment_note: Generated package keeps the workbook play frame and records any
      V1 limitation in demo_support.yaml.
  canonical_mechanic: collect
  mechanic_confidence: high
  category_decision: cat5
  readiness: generate_with_assumptions
  trigger_condition: Child enters language treasure-hunt mode or photographs an everyday
    object suitable for sound play.
  entity_role: exemplar
  observation_angle: function
  focal_attribute: beginning sound evidence
  mapping_use:
    required: false
    available: false
    value_if_available: []
    missing_mapping_risk: none
  product_capability_flags:
  - generated_assets
  - real_camera
  - runtime_judgment
  - device_round_screen
  asset_dependency:
