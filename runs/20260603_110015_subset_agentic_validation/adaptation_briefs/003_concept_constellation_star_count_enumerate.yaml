adaptation_brief:
  input_mode: concept_only
  core_promise: Number choice comes before the reveal; the displayed card is approved
    and reference-bound; the AI gives one fact instead of asking the child to count
    a generic image.
  source_promise_alignment:
    original_play_frame: Child chooses a number, then device shows an approved real
      constellation card matching that guide-star count and gives brief background
      context.
    child_role: child completes the source activity action directly
    interaction_sequence:
    - Choose A Star Number
    - Reveal The Matching Real Card
    - Hear One Background Fact
    required_child_actions:
    - enumerate
    - respond to source evidence
    non_negotiable_elements:
    - Child chooses a number, then device shows an approved real constellation card
      matching that guide-star count and gives brief background context.
    allowed_v1_adaptations:
    - direct supported package behavior
    product_dependencies:
    - generated_assets
    - device_round_screen
    alignment_status: aligned
    alignment_note: Generated package keeps the workbook play frame and records any
      V1 limitation in demo_support.yaml.
  canonical_mechanic: enumerate
  mechanic_confidence: high
  category_decision: cat1
  readiness: generate_with_assumptions
  trigger_condition: Child chooses a space theme or the screen can show an approved
    constellation card.
  entity_role: reference
  observation_angle: quantity
  focal_attribute: chosen guide-star count
  mapping_use:
    required: false
    available: false
    value_if_available: []
    missing_mapping_risk: none
  product_capability_flags:
  - generated_assets
  - device_round_screen
  asset_dependency:
    policy: generate_and_curate
    assets:
    - asset_id: activity_icon
      asset_type: activity_preview
      asset_role: activity_preview
      requiredness: required
      generation_timing: pre_generated
      style_id: wonderlens_device_mint_soft_3d
      accuracy_mode: illustrative
      source_strategy: generated_illustrative
      transformation_policy: generate_new
      use_step: prod runtime beat
      display_location: round_device_screen
      screen_targets:
      - round_device_screen
      target_variants:
      - id: round_512
        target: round_device_screen
        size: 512x512
        path: null
      prompt_en: 'Flat Nordic children illustration matching the quiet white WonderLens
        prototype; broad flat color fills, sparse arc-eye and texture linework, restrained
        boho pastels, generous negative space, square 512x512 source art, no readable
        text, no letters or numbers, no logos, no watermark, no masks, no borders,
        and no baked UI chrome. Subject: Constellation Number Reveal activity icon
        motif, source-aligned but free of app-owned interface elements. One visual
        unit only. Keep important detail inside the central safe area. For scenes,
        no selectable target objects that compete with separate sprites.'
      source: new_generated_source_png
      fallback_behavior: If activity_icon is unavailable, keep the runtime beat honest
        and use voice-only fallback without claiming this image is visible.
