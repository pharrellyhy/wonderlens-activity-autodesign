adaptation_brief:
  input_mode: parameterized
  core_promise: Three real-world finds become evidence for one shared rule and one
    child-generated extra connection.
  source_promise_alignment:
    original_play_frame: Child finds and photographs three things that share a color,
      shape, or category, then names one extra shared connection.
    child_role: child completes the source activity action directly
    interaction_sequence:
    - First Matching Find
    - Second Matching Find
    - Third Matching Find
    required_child_actions:
    - collect
    - respond to source evidence
    non_negotiable_elements:
    - Child finds and photographs three things that share a color, shape, or category,
      then names one extra shared connection.
    allowed_v1_adaptations: &id001
    - The current demo cannot reliably judge arbitrary shared color, shape, or category
      from image data alone.
    - The package accepts child-stated evidence and preserves the three-photo collection
      plus synthesis loop.
    product_dependencies:
    - generated_assets
    - real_camera
    - runtime_judgment
    - device_round_screen
    alignment_status: minor_adaptation
    alignment_note: Generated package keeps the workbook play frame and records any
      V1 limitation in demo_support.yaml.
  canonical_mechanic: collect
  mechanic_confidence: high
  category_decision: cat5
  readiness: generate_with_assumptions
  trigger_condition: Child photographs an object with a clear color, shape, or category
    feature.
  entity_role: exemplar
  observation_angle: pattern
  focal_attribute: shared visible clue
  mapping_use:
    required: false
    available: false
    value_if_available: []
    missing_mapping_risk: none
  product_capability_flags:
  - generated_assets
  - real_camera
  - runtime_judgment
  - device_round_screen
  asset_dependency:
    policy: generate_and_curate
    assets:
    - asset_id: activity_icon
      asset_type: activity_preview
      asset_role: activity_preview
      requiredness: required
      generation_timing: pre_generated
      style_id: wonderlens_device_mint_soft_3d
      accuracy_mode: illustrative
      source_strategy: generated_illustrative
      transformation_policy: generate_new
      use_step: prod runtime beat
      display_location: round_device_screen
      screen_targets:
      - round_device_screen
      target_variants:
      - id: round_512
        target: round_device_screen
        size: 512x512
        path: null
      prompt_en: 'Flat Nordic children illustration matching the quiet white WonderLens
        prototype; broad flat color fills, sparse arc-eye and texture linework, restrained
        boho pastels, generous negative space, square 512x512 source art, no readable
        text, no letters or numbers, no logos, no watermark, no masks, no borders,
        and no baked UI chrome. Subject: Shared Clue Scavenger Hunt activity icon
        motif, source-aligned but free of app-owned interface elements. One visual
