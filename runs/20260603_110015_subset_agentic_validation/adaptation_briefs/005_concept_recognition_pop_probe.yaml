adaptation_brief:
  input_mode: concept_only
  core_promise: The child compares changing pictures against a target rule; target
    and distractor sprites are separate from scene backgrounds.
  source_promise_alignment:
    original_play_frame: After a source object such as dog, the device shows changing
      target and distractor pictures and the child responds only when the target appears.
    child_role: child completes the source activity action directly
    interaction_sequence:
    - Learn The Target Rule
    - Compare One Distractor
    - Pop The Target Again
    required_child_actions:
    - compare
    - respond to source evidence
    non_negotiable_elements:
    - After a source object such as dog, the device shows changing target and distractor
      pictures and the child responds only when the target appears.
    allowed_v1_adaptations: &id001
    - The package preserves the target-versus-distractor timing rule, but the current
      conversion path cannot prove fast tap UI timing.
    - Dialogue QA must verify that target/distractor rules are not weakened into ordinary
      matching.
    product_dependencies:
    - generated_assets
    - runtime_judgment
    - device_round_screen
    alignment_status: minor_adaptation
    alignment_note: Generated package keeps the workbook play frame and records any
      V1 limitation in demo_support.yaml.
  canonical_mechanic: compare
  mechanic_confidence: high
  category_decision: cat1
  readiness: generate_with_assumptions
  trigger_condition: Product has a tap-based recognition game surface.
  entity_role: exemplar
  observation_angle: shape
  focal_attribute: target versus distractor recognition
  mapping_use:
    required: false
    available: false
    value_if_available: []
    missing_mapping_risk: none
  product_capability_flags:
