activity_id: concept_guided_drawing_probe
entity_id: paper_drawing
version: 1
style_id: wonderlens_device_mint_soft_3d
palette:
  shell: warm porcelain off-white
  screen: barely tinted white
  primary_accent: muted sage green
  secondary_accent: soft terracotta salmon
  shadow: pale lavender gray
screen_targets:
  round_device_screen:
    aspect_ratio: '1:1'
    crop_shape: circle
    master_size: 512
    safe_area: central 72 percent circle
assets:
- id: activity_icon
  role: activity_preview
  label: Activity icon for Step Card Drawing Guide.
  requiredness: required
  accuracy_mode: illustrative
  source_strategy: generated_illustrative
  transformation_policy: generate_new
  prompt_en: 'Use case: illustration-story. Asset type: WonderLens full-pass runtime
    activity asset. Primary request: Activity icon for Step Card Drawing Guide. Composition:
    single centered icon or badge on a clean white background, no app UI; generate
    a 512x512 square source PNG; if the image tool returns a larger square, downsample
    it to 512x512 before asset build; keep important details inside the central round-lens
    safe area. Activity-specific direction: guided drawing scene assets must be usable
    as step cards. For this asset, show a clean paper-and-pencil guided drawing motif,
    with a simple circle drawing as the main subject. Include paper and pencil only
    as supporting context. Style: flat Nordic children''s illustration matching the
    quiet white WonderLens prototype; broad flat color fills, sparse arc-eye or tiny
    texture linework, light colored-pencil grain, restrained boho pastels, airy negative
    space, organic simple silhouettes. No readable text, letters, numbers, labels,
    logos, watermark, border, contact sheet, multi-card sheet, device frame, circular
    mask, vignette, black corners, glossy eyes, chibi toy look, hard shadows, or clutter.
    Do not draw progress dots, round markers, response slots, rule strips, buttons,
    chips, picker slots, badges, or other app-owned interface state; the runtime overlays
    those separately.'
  variants:
  - id: round_512
    target: round_device_screen
    size: 512x512
    path: assets/activity_icon__round_512.png
  fallback_behavior: If this beat asset is unavailable, degrade the demo screen and
    do not claim that the missing visual is displayed.
