branch_policy:
  hook:
    ideal: child agrees or asks to play.
    unexpected: child asks for a different game or gives an unrelated comment.
    no_response: child looks at the screen or waits.
  transition:
    ideal: child repeats the rule or says ready.
    unexpected: child asks what counts or proposes a different rule.
    no_response: child hesitates before starting.
  celebrate:
    ideal: child reacts, repeats, or smiles.
    unexpected: child asks to change the result or asks for another round.
    no_response: child quietly watches the celebration.
  closing:
    ideal: child says again, goodbye, or favorite part.
    unexpected: child asks for a different topic.
    no_response: child watches silently.
  round_1:
    ideal: child says done or caregiver confirms.
    unexpected: child asks if it must be perfect.
    no_response: child keeps drawing silently.
  round_2:
    ideal: child reports done or asks for more time.
    unexpected: child adds many shapes or changes the object.
    no_response: child stays focused on drawing.
  round_3:
    ideal: child says ready or shows caregiver.
    unexpected: child wants camera grading or asks if it is good.
    no_response: child keeps drawing silently.
