- id: cassiopeia_five_star_card
  role: story_scene
  label: Cassiopeia five-guide-star reference card
  requiredness: required
  accuracy_mode: reference_bound
  source_strategy: approved_internal_reference
  transformation_policy: crop_resize_only
  prompt_en: Use the accepted package-local Cassiopeia teaching chart. Preserve exactly
    5 prominent guide stars and approved guide-line shape. Do not add extra stars,
    text, labels, numbers, or fictional geometry.
  reference_policy:
    source_required: true
    allowed_sources:
    - approved_internal_reference
    verification_required: true
    verification_notes: Package-local approved Cassiopeia guide-star chart with 5
      visible guide stars.
  sources:
  - label: Approved internal Cassiopeia 5-guide-star teaching chart
    uri: internal://approved-constellation-reference/cassiopeia-5-guide-stars-v1
    license: Approved internal educational reference
    source_type: approved_internal_reference
  variants:
  - id: round_512
    target: round_device_screen
    size: 512x512
    path: assets/cassiopeia_five_star_card__round_512.png
  fallback_behavior: If the accepted Cassiopeia source is unavailable, do not reveal
    or describe the constellation card.
