branch_policy:
  hook:
    ideal: child agrees or asks to play.
    unexpected: child asks for a different game or gives an unrelated comment.
    no_response: child looks at the screen or waits.
  transition:
    ideal: child repeats the rule or says ready.
    unexpected: child asks what counts or proposes a different rule.
    no_response: child hesitates before starting.
  celebrate:
    ideal: child names a shared rule, pattern, story link, or summary.
    unexpected: child says the finds are different or chooses a favorite only.
    no_response: child reviews the completed collection quietly.
  closing:
    ideal: child says again, goodbye, or favorite part.
    unexpected: child asks for a different topic.
    no_response: child watches silently.
  round_1:
    ideal: '"It is round" or "same color".'
    unexpected: child says it is favorite or unrelated.
    no_response: child watches the photo quietly.
  round_2:
    ideal: '"same shape" or "same kind".'
    unexpected: child names a different detail such as bigger.
    no_response: child holds device without answer.
  round_3:
    ideal: '"yes, same color" or points.'
    unexpected: child cannot find one or asks to count a maybe item.
    no_response: child keeps searching silently.
