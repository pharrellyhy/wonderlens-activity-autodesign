original_play_frame: "A phoneme scavenger hunt: the device gives the /b/ target, the child finds a real object whose spoken name starts with /b/, and the result is collected as a treasure."
child_role: "Sound treasure hunter who searches the real environment, captures one real object, and gives its name as phoneme evidence."
device_role_action: "Announces the target sound, optionally gives visual/letter support, asks for a photo plus name evidence, and celebrates only when the initial sound criterion is preserved."
interaction_sequence:
  - "Introduce the hungry /b/ target."
  - "Provide support for what counts as a /b/-starting word."
  - "Child finds and photographs a real object."
  - "Child supplies the object name so the sound can be checked."
  - "Device celebrates the collected sound treasure."
required_child_actions:
  - "Listen to or repeat the /b/ target."
  - "Find a real object, not just choose a screen card."
  - "Take or provide a photo of the object."
  - "Say or otherwise provide the object name as initial-sound evidence."
real_or_reference_asset_requirement: "Real-world object photo is required. Source permits simple screen support such as a corresponding letter; generated clue images may support the hunt but must not replace the real object."
required_background_context: "The collection rule is the initial phoneme /b/; the activity is not generic object finding or photo collection."
non_negotiable_source_elements:
  - "Cat5 photo-coupled scavenger format."
  - "Target initial sound remains /b/."
  - "Real object search remains required."
  - "A collected item must be tied to its spoken/name evidence."
  - "Screen support must stay subordinate to the real-world hunt."
allowed_v1_adaptations:
  - "Require child speech or typed/name evidence because the demo cannot honestly infer the initial phoneme from a photo alone."
  - "Use generated ball/banana clue cards as optional support instead of a literal letter card, as long as the real hunt remains required."
  - "Mark demo support as degraded to preserve runtime honesty."
