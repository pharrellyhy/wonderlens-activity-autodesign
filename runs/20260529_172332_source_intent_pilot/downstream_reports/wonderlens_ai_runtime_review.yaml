  - id: generated_load_and_gate_verification
    cwd: /Users/pharrelly/codebase/gitlab/wonderlens-ai
    command: |
      .venv/bin/python - <<'PY'
      from pathlib import Path
      import json

      from app.modules.activity.packages.adapter import ActivityPackageAdapterError, game_definition_from_package
      from app.modules.activity.packages.loader import load_activity_packages

      root = Path('validation_artifacts/source_intent_pilot_runtime_20260529_172332/generated_activities')
      expected_supported_or_degraded = {
          'concept_career_decision_decide',
          'concept_constellation_star_count_enumerate',
          'concept_partial_reveal_deduce',
          'concept_phoneme_hunt_collect',
          'concept_would_you_rather_compare',
      }
      expected_unsupported = {
          'concept_guided_drawing_probe',
          'concept_plant_parts_enumerate',
      }
      packages = load_activity_packages(root)
      summary = {
          'root': str(root),
          'loaded_count': len(packages),
          'loaded_ids': [package.activity_id for package in packages],
          'packages': [],
          'errors': [],
      }
      for package in packages:
          runtime_support = (package.runtime.model_extra or {}).get('runtime_support') or {}
          entry = {
              'activity_id': package.activity_id,
              'template_type': package.runtime.template_type,
              'support_status': package.package_readiness.support_status,
              'support_level': package.package_readiness.support_level,
              'asset_readiness': package.package_readiness.asset_readiness,
              'required_missing_asset_ids': list(package.package_readiness.required_missing_asset_ids),
              'runtime_requires_extension': bool(runtime_support.get('requires_runtime_extension')),
              'runtime_extension_reasons': list(runtime_support.get('extension_reasons') or []),
          }
          try:
              game = game_definition_from_package(package)
              entry['adapter_status'] = 'executable'
              entry['game_activity_type'] = game.activity_type
          except ActivityPackageAdapterError as exc:
              entry['adapter_status'] = 'gated'
              entry['adapter_error'] = str(exc)
          summary['packages'].append(entry)

      loaded_ids = set(summary['loaded_ids'])
      if loaded_ids != expected_supported_or_degraded | expected_unsupported:
          summary['errors'].append(f"loaded IDs mismatch: {sorted(loaded_ids)}")
      for entry in summary['packages']:
          activity_id = entry['activity_id']
          if activity_id in expected_supported_or_degraded:
              if entry['adapter_status'] != 'executable':
                  summary['errors'].append(f"{activity_id} expected executable but was {entry['adapter_status']}: {entry.get('adapter_error')}")
              if entry['support_status'] not in {'supported', 'degraded'}:
                  summary['errors'].append(f"{activity_id} support_status drifted to {entry['support_status']}")
          if activity_id in expected_unsupported:
              if entry['adapter_status'] != 'gated':
                  summary['errors'].append(f"{activity_id} expected gated but was executable")
              if entry['support_status'] != 'unsupported':
                  summary['errors'].append(f"{activity_id} support_status drifted to {entry['support_status']}")

      summary['verdict'] = 'pass' if not summary['errors'] else 'fail'
      print(json.dumps(summary, indent=2, sort_keys=True))
      raise SystemExit(0 if not summary['errors'] else 1)
      PY
