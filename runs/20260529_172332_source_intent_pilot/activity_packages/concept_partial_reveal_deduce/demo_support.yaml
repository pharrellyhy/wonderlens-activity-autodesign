activity_id: concept_partial_reveal_deduce
version: 1
parameterization:
  mode: asset_catalog_target
  decision_source: current_package_review
  integrity_status: catalog_clue_target
  confidence: high
  evidence:
    - Asset manifest declares rabbit ears, tiger tail, and elephant trunk reveal cards.
    - Correct answers come from the authored clue-card catalog, not arbitrary entity handoff.
  validity:
    production_supported: true
    requires:
      - clue card asset id
      - hidden answer label
      - accepted guess list
    invalid_when:
      - clue card asset is missing
      - hidden answer cannot be read from package metadata
      - handoff asks for an entity outside the reveal-card catalog
  source_fields:
    clue_assets:
      - asset_manifest.assets[].id
      - asset_manifest.assets[].label
  derived_runtime_fields:
    target_card_ids:
      - rabbit_ears_reveal_card
      - tiger_tail_reveal_card
      - elephant_trunk_reveal_card
    answer_labels:
      - rabbit
      - tiger
      - elephant
  authored_constants:
    reveal_rule: show a partial clue before the whole answer
  fallback_behavior: Use only declared reveal cards; do not invent answers for uncataloged handoff entities.
  consumer_notes:
    wonderlens_ai: Treat the catalog as the source of truth for answer labels and accepted guesses.
  reviewer_action: verify_clue_answer_mapping_before_accepting
demo_support:
  status: supported
  ui_template: cat1_dialogue
  support_level: full
  entity_bindings:
  - entity_id: partial_animal_reveal_cards
    display_label: Partial Animal Reveal Cards
    source_entity_exemplar: partial animal reveal cards
    default: true
  requires:
    generated_assets: true
    real_camera: false
    runtime_judgment: false
    device_round_screen: true
  unsupported_reasons: []
  degraded_reasons: []
  consumer_notes:
    fullstack_demo: Import with scripts/import_autodesign_package.py; preserve demo_support
      gating and converted step_instructions.
    wonderlens_ai: Convert prod.md with scripts/generate_activity_runtime.py; preserve
      support, asset, and runtime-beat metadata.
