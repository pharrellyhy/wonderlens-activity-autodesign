recap_payload:
  entity: "{runtime_entity}"
  tier: "{runtime_tier}"
  age_years: "{runtime_age}"

  what_we_noticed: pattern
  what_we_did: collected
  entity_role: exemplar

  focal_attribute:
    token: "{shared_feature}"
    child_label: "{shared_feature}"
    badge_emoji_none: true

  highlight_moment: "You found three things with the same clue and named another connection."

  finds:
    - {label: "{find_1}", photo: "{photo_1}"}
    - {label: "{find_2}", photo: "{photo_2}"}
    - {label: "{find_3}", photo: "{photo_3}"}

  extra_connection: "{extra_connection}"
  difficulty_level: 2
  next_step_hint: "Next time, try two clues at once."

  caregiver_observed: co-explorer
  reward_badge: shared_clue_scout

rendered:
  title: "You were a Shared Clue Scout today!"
  line_1: "You started with the {runtime_entity}."
  line_2: "You collected 3 things with {shared_feature}."
  line_3: "You found another connection: {extra_connection}."
  badge: "Shared Clue Scout"
  next: "Next time, try two clues at once."
