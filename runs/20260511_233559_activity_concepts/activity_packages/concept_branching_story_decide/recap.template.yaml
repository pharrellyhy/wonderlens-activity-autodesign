recap_payload:
  entity: "{runtime_entity}"
  tier: "{runtime_tier}"
  age_years: "{runtime_age}"

  what_we_noticed: behavior
  what_we_did: decided
  entity_role: catalyst

  focal_attribute:
    token: "story_choice_path"
    child_label: "story path choices"
    badge_emoji_none: true

  highlight_moment: "You chose three story steps and made your own path."

  choices:
    - {step: door, choice: "{door_choice}"}
    - {step: helper, choice: "{helper_choice}"}
    - {step: ending, choice: "{ending_choice}"}

  difficulty_level: 2
  next_step_hint: "Next time, explain why the hero chooses a path."

  caregiver_observed: co-explorer
  reward_badge: story_path_chooser

rendered:
  title: "You were a Story Path Chooser today!"
  line_1: "You chose the door, helper, and ending."
  line_2: "Each choice changed the story."
  line_3: "Your {runtime_entity} started a new adventure."
  badge: "Story Path Chooser"
  next: "Next time, explain why the hero chooses."
