adaptation_brief:
  activity_id: concept_phoneme_hunt_collect
  input_mode: parameterized
  core_promise: "The AI introduces the /b/ beginning sound, then the child finds one indoor treasure whose spoken word starts with that sound and shows it with the camera."
  source_promise_alignment:
    original_play_frame: "A sound-focused scavenger hunt where /b/ is the collection rule."
    child_role: "Beginning-sound treasure finder."
    device_role: "Introduce the /b/ sound, invite one photo-backed find, and judge the spoken/typed object name rather than the image alone."
    interaction_sequence:
      - "AI models /b/ /b/ /b/."
      - "AI asks the child to find one treasure whose word starts with /b/."
      - "Child photographs or shows one candidate object and names it."
      - "AI accepts a /b/ word or redirects a non-/b/ word gently."
      - "AI summarizes the beginning-sound rule."
    required_child_actions:
      - "Hear the /b/ sound."
      - "Search indoors for one object."
      - "Show or photograph the object."
      - "Say or enter the object name so the sound evidence can be judged."
    non_negotiable_elements:
      - "Target sound must be /b/."
      - "The target sound is the collection criterion."
      - "The activity remains playful, not a formal phonics test."
      - "Letter support is optional; voice-only fallback must work."
    allowed_v1_adaptations:
      - "Use child-provided object name as evidence because V1 cannot infer a beginning phoneme from a photo alone."
      - "Use a text-free cue-card backing with app-owned /b/ or B overlay, or voice-only fallback if overlay is unavailable."
      - "Use generated object picker sprites as examples/distractors, but do not replace the real child find."
    product_dependencies:
      - "generated_assets"
      - "real_camera"
      - "runtime_judgment"
      - "device_round_screen"
      - "optional_letter_overlay"
    alignment_status: aligned
    alignment_note: "The runtime keeps the source sequence: introduce /b/, ask for one matching treasure, require child name evidence, and summarize why it matched."
  canonical_mechanic: collect
  mechanic_confidence: high
  category_decision: cat5
  readiness: generate_with_assumptions
  trigger_condition: "Child enters language treasure-hunt mode or photographs an everyday object suitable for sound play."
  entity_role: exemplar
  observation_angle: function
  focal_attribute: "beginning sound /b/"
  mapping_use:
    required: false
    available: false
    value_if_available: []
    missing_mapping_risk: none
  product_capability_flags:
