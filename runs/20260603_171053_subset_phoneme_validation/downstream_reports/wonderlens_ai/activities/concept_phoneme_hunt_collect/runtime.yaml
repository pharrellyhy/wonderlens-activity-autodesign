branch_policy:
  hook:
    ideal: '"I want to play" or "What sound?"'
    unexpected: '"Here is my cup" before hearing the rule.'
    no_response: Child watches the intro scene but does not speak.
  transition:
    ideal: Child says "/b/" or names "ball," "book," or "banana."
    unexpected: Child says "cup" or another non-B word.
    no_response: Child listens but does not repeat.
  celebrate:
    ideal: Child says "It starts with /b/" or repeats the object name.
    unexpected: Child says "I like my book" without naming the sound.
    no_response: Child watches the synthesis screen.
  closing:
    ideal: Child says "again," "bye," or repeats the B word.
    unexpected: Child asks for a different sound immediately.
    no_response: Child stays quiet after the celebration.
  round_1:
    ideal: Child repeats "/b/" or says "banana."
    unexpected: Child says "cup" because it is nearby.
    no_response: Child looks around the room without speaking.
  round_2:
    ideal: Child returns with photo_id and says "book" or "ball."
    unexpected: Child says "I cannot find one" or brings a cup.
    no_response: Child keeps searching and does not answer.
  round_3:
    ideal: Child names "book," "ball," "banana," "box," or "bag."
    unexpected: Child says "cup" after photographing a cup.
    no_response: Child shows the object but does not name it.
