    fallback_behavior: Do not start the package if approved constellation card metadata is unavailable.
    reviewer_action: verify_catalog_metadata_before_accepting.
    metadata_action: Add catalog metadata for approved cards, star_count, display name, child-safe fact, and invalid_when approved metadata is missing.

