notes:
  - Classifications are mode-driven and describe current package evidence, not desired future behavior.
  - "entity_class_filter: [] is broad match metadata only; it is not proof of dynamic handoff support."
  - initial_sound_from_entity uses first normalized English letter as the MVP approximation until a phoneme resolver exists.
