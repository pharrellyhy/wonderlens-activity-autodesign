  - activity_id: concept_recognition_pop_probe
    entity_compatibility: source_bound
    inspected_paths:
      - runs/20260603_110015_subset_agentic_validation/activity_packages/concept_recognition_pop_probe
    mode: asset_catalog_target
    evidence:
      - Run-local assets declare a dog target with fox, wolf, and cat distractors.
      - Gameplay responds only to the declared target sprite/catalog, not arbitrary entity handoff.
    validity:
      production_supported: true
      requires:
        - collection_correct target asset
        - collection_distractor assets
        - runtime support for target/distractor timing rule
      invalid_when:
        - target or distractor catalog is missing
        - fast-tap timing cannot be represented honestly
        - handoff asks for an entity outside the declared target catalog
    source_fields:
      target_asset:
        - asset_manifest.assets[role=collection_correct].id
        - asset_manifest.assets[role=collection_correct].label
      distractor_assets:
        - asset_manifest.assets[role=collection_distractor].id
        - asset_manifest.assets[role=collection_distractor].label
    derived_runtime_fields:
      target_label: dog
      distractor_labels:
        - fox
        - wolf
        - cat
      timing_rule: respond only when the dog target appears
    authored_constants:
      response_rule: fast target recognition
    fallback_behavior: Run only with declared target/distractor assets; degrade timing claims if UI cannot prove fast responses.
    reviewer_action: verify_target_catalog_and_timing_before_accepting.
    metadata_action: Add target/distractor catalog metadata, accepted target label, timing requirement, and invalid_when sprites or timing support are unavailable.

