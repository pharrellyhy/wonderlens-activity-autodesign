activity_id: concept_animal_sound_motion_voice
version: 1
template_type: cat1
pillar: Performance
game_style: voice_stage
entity: workbook_source_concept
entity_class:
- activity_concept
entity_binding: agnostic
tier_range:
  primary: T1
  span:
  - T0
  - T1
  elasticity: Can simplify language and reduce rounds for younger children.
category: cat1
attributes:
- animal_sound_imitation
- motion_voice
key_concepts:
