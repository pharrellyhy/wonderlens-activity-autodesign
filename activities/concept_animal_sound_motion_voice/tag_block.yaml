  entity_class_filter: []
  tier_support:
    T0: true
    T1: true
    T2: true
source_workbook_row: 13
source_concept: source_animal_sound_imitation
response_verification:
  type: transcript_token_match
  evidence_source: stt_transcript
  required: true
  source_guard:
    allowed_sequence: [rabbit, cat, puppy]
    redirect_on: [idk, off_topic, unrelated_animal, unsafe_motion_voice]
    redirect_behavior: Stay on the current active animal card; do not praise or expand
      unrelated content. Ask for the smallest safe sound or role line for that animal.
    disallow: [invented_animals, rough_or_loud_voice, unsafe_large_motion]
  applies_to_steps:
    - STEP_3_ROUND_1
    - STEP_3_ROUND_2
    - STEP_3_ROUND_3
  rounds:
    - round_number: 1
      step: STEP_3_ROUND_1
      target_id: rabbit
      target_label: rabbit
      accepted_tokens: [rabbit, bunny, sniff, sniffle, squeak]
      accepted_role_lines: [i am a rabbit, "i'm a rabbit", little rabbit, quiet rabbit]
      success_direction: Name the safe rabbit try in a few words, then move to the cat card and ask for one soft or sleepy meow or the line "I am a cat."
      retry_direction: Keep the rabbit card in focus and ask for one tiny rabbit sniff or the line "I am a rabbit."
    - round_number: 2
      step: STEP_3_ROUND_2
      target_id: cat
      target_label: cat
      accepted_tokens: [cat, kitty, kitten, meow, miaow, mew, purr]
      accepted_role_lines: [i am a cat, "i'm a cat", sleepy cat, soft meow, happy meow]
      success_direction: Name the safe cat try in a few words, then move to the puppy card and ask for one friendly woof or the line "I am a puppy."
      retry_direction: Keep the cat card in focus and ask for one soft meow or the line "I am a cat."
    - round_number: 3
      step: STEP_3_ROUND_3
      target_id: puppy
      target_label: puppy
      accepted_tokens: [puppy, dog, doggy, woof, bark, arf, ruff, bowwow]
      accepted_role_lines: [i am a puppy, "i'm a puppy", good puppy, friendly puppy]
      success_direction: Name the safe puppy try in a few words, then move to saving the three animal sounds.
      retry_direction: Keep the puppy card in focus and ask for one friendly woof or the line "I am a puppy."
