  know:
  - The child knows the activity rule and one source-specific cue.
  understand:
  - The child understands that their action affects the next beat.
  do:
  - The child practices deduce through short guided turns.
progression:
  topic_axis: causation
  difficulty_level: 2
  next_step_hint: Repeat with a new topic while preserving the same mechanic.
  reward_hook: Saved turns reveal a source-specific payoff.
caregiver_role:
- observer
activity_signature:
  observation_angle: function
  mechanic: deduce
  entity_role: catalyst
  focal_attribute: partial_reveal_guess
  intro: The screen reveals a fixed mystery picture one clue at a time, and the child
    makes maybe-guesses from only the visible clues until the final reveal.
  bridge_prerequisites:
    primary:
    - function
    secondary:
    - function
    - state
  preview_label: Mystery Clue Guess
  preview_prompt: Try Mystery Clue Guess with one short guided round.
  role_pivot_note: The workbook concept supplies the play frame; a photographed object
    may only act as a catalyst.
matchability:
  entity_class_filter: []
  tier_support:
    T0: true
    T1: true
    T2: true
source_workbook_row: 11
source_concept: source_partial_reveal_guess
response_verification:
  mode: partial_reveal_final_answer
  evidence_source: stt_transcript
  final_round: 3
  hide_answer_until: final_reveal
  speaker_dialogue_mode: package_guided_llm
  dialogue_policy:
    mode: llm_guided_with_exact_fallback
    max_sentences: 2
    style: curious, gentle, suspenseful, and child-facing
    semantic_target: Use the selected dialogue act as the meaning to preserve, not
      as mandatory wording.
    must:
      - Treat early answers as maybe-guesses.
      - Use only the visible clue for the active round.
      - Keep the hidden answer hidden until the final reveal.
    avoid:
      - Repeating or confirming hidden answer terms before the final reveal.
      - Adding extra clues, animals, objects, tails, whiskers, or claws.
      - Saying the child guessed correctly before the reveal.
      - Explaining verifier rules or runtime behavior.
    forbidden_phrases:
      - here is the rule
      - WonderLens will
      - you guessed it
      - that's wrong
  dialogue_acts:
    rule_intro:
      line: Mystery Clue Guess shows one clue at a time. Make a maybe-guess; the answer waits for the final reveal.
    round_prompt:
      by_round:
        1:
          line: "First clue: pointy ears. What could this hidden picture maybe be?"
        2:
          line: Now we can see paws or feet. Does your guess change or stay?
        3:
          line: "Final guess: use pointy ears and paws or feet. What could it be?"
    pre_final_advance:
      by_round:
        1:
          line: "I saved that maybe-guess. Next clue: paws or feet. Does your guess change or stay?"
        2:
          line: "I saved that maybe-guess. Final guess: use pointy ears and paws or feet. What could it be?"
    wrong_retry:
      by_round:
        1:
          line: Stay with pointy ears for now. What could this hidden picture maybe be?
        2:
          line: Stay with paws or feet for now. Does your guess change or stay?
        3:
          line: Stay with pointy ears and paws or feet. What is your final guess?
    off_topic_redirect:
      by_round:
        1:
          line: Stay with pointy ears for now. What could this hidden picture maybe be?
        2:
          line: Stay with paws or feet for now. Does your guess change or stay?
        3:
          line: Stay with pointy ears and paws or feet. What is your final guess?
    answer_request_redirect:
      by_round:
        1:
          line: The answer waits. Use pointy ears for one maybe-guess.
        2:
          line: The answer waits. Use paws or feet for one maybe-guess.
        3:
          line: This is the final guess. Use pointy ears and paws or feet.
    idk_support:
      by_round:
        1:
          line: That's okay. Use pointy ears for one maybe-guess.
        2:
          line: That's okay. Use paws or feet for one maybe-guess.
        3:
          line: That's okay. Use pointy ears and paws or feet for your final guess.
    final_reveal:
      line: "Reveal: it was a cat. Pointy ears and paws were the clues."
    wrong_final_reveal:
      line: "Reveal: it was a cat. Pointy ears and paws were the clues."
    celebrate:
      line: You used the clues and saved your guesses.
    closing:
      line: You looked at parts and made careful guesses about the whole cat.
  source_guard:
    fixed_visible_clue_sequence:
      - pointy ears
      - paws or feet
      - final reveal
    redirect_on: [idk, off_topic, asks_for_answer, asks_for_new_clue]
    redirect_behavior: Stay on the current visible clue only; do not praise or expand
      unrelated content. Ask for one maybe-guess without confirming or denying the
      hidden answer before final reveal.
    disallow: [invented_animals, invented_objects, invented_clues, early_answer_confirmation]
  hidden_answer:
    canonical: cat
    accepted_terms: [cat, kitty, kitten]
  visible_clues:
    - pointy ears
    - paws or feet
  rounds:
    - round_number: 1
      accepted_tokens: [ears, pointy, animal, maybe]
      success_direction: Save the maybe-guess without confirming it, then say the paws-or-feet clue is next and ask whether the guess changes. Do not reveal the answer.
      retry_direction: Stay with the pointy-ears clue and ask what the hidden picture could maybe be. Do not reveal the answer.
    - round_number: 2
      accepted_tokens: [paws, feet, animal, maybe]
      success_direction: Save the maybe-guess without confirming it, then ask for a final guess using only pointy ears and paws or feet.
      retry_direction: Stay with the paws-or-feet clue and ask whether the child wants to keep or change the maybe-guess. Do not reveal the answer.
  correct_final_response_direction: Reveal that the answer is cat and move to the big reveal.
  wrong_final_response:
    action: advance
    response_direction: Reveal that the answer is cat and advance neutrally.
