      select: none
      confirm: voice
    verification_policy:
      type: echo_match
      required: true
      target:
        type: display_asset
        display_asset_id: echo_variation_prompt
      evidence:
        - transcript
    effect_profile:
      id: echo_confirm
      sound_effects:
        - replay_prompt
        - echo_chime
      lighting_effects:
        - word_focus
        - success_ring
      haptic_feedback:
        - replay_pulse
        - confirm_pulse
  - frame_id: step_3_round_3
    step_ref: prod.step_3.round_3
    layout_id: single_image
    display_asset_id: remembered_echo_pair
    control_mode: replay_only
    input_affordance:
      select: none
      confirm: voice
    verification_policy:
      type: echo_match
      required: true
      target:
        type: display_asset
        display_asset_id: remembered_echo_pair
      evidence:
        - transcript
    effect_profile:
      id: echo_confirm
      sound_effects:
        - replay_prompt
        - echo_chime
      lighting_effects:
        - word_focus
        - success_ring
      haptic_feedback:
        - replay_pulse
