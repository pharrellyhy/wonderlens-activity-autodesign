# Parent dashboard FRAGMENT produced by this game.
# This is what gets merged into the device-scoped rollup at session end.
dashboard_fragment:
  session:
    axis: connection
    angle: pattern
    mechanic: collect
    entity_role: subject
    focal_attribute: "butterfly_wing_pattern"
    entry_rung: "{runtime_entry_rung}"
    exit_rung:  "{runtime_exit_rung}"
    outcome:    "{runtime_outcome}"         # promote | hold | demote | soft_reframe

  contributes_to:
    curiosity_radial:
      axis: connection
      angle: pattern                         # bumps connection.by_angle.pattern.sessions
    exploration_matrix:
      cell: "collect × pattern"              # bumps this cell's count
    key_concepts_exposure:
      Connection:
        angle: pattern
    atl_skills_trail:
      - observation
      - classification
