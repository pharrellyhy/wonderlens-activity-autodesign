activity_id: dream_whisperer_cat
entity_id: cat
version: 1
style_id: wonderlens_device_mint_soft_3d
palette:
  shell: warm porcelain off-white
  screen: green-tinted near black
  primary_accent: soft mint green
  secondary_accent: pale sage
  shadow: cool gray green
screen_targets:
  round_device_screen:
    aspect_ratio: "1:1"
    crop_shape: circle
    master_size: 512
    safe_area: central 72 percent circle
assets:
  - id: activity_icon
    role: activity_preview
    label: Dream Whisperer Cat activity icon
    requiredness: required
    accuracy_mode: illustrative
    source_strategy: generated_illustrative
    transformation_policy: generate_new
    prompt_en: "Flat Nordic children's illustration of a peaceful sleepy cat curled beside a tiny crescent moon and soft dream bubbles, clean white background, restrained boho pastels, no text, no numbers, no watermark."
    variants:
      - id: round_512
        target: round_device_screen
        size: 512x512
        path: assets/activity_icon__round_512.png
    fallback_behavior: Show the Dream Whisperer title and keep the photographed cat as the visual anchor.
  - id: intro_scene
    role: story_scene
    label: Sleepy cat introduction scene
    requiredness: required
    accuracy_mode: illustrative
    source_strategy: generated_illustrative
    transformation_policy: generate_new
    prompt_en: "Full-bleed flat Nordic nursery scene of a sleepy cat resting on a soft cushion while gentle dream bubbles begin above it, airy white room, warm quiet mood, no text, no numbers, no watermark."
    variants:
      - id: round_512
        target: round_device_screen
        size: 512x512
        path: assets/intro_scene__round_512.png
    fallback_behavior: Keep the photographed cat centered and introduce the dream journey by voice.
  - id: rules_scene
    role: story_scene
    label: Dream journey rules scene
    requiredness: required
    accuracy_mode: illustrative
    source_strategy: generated_illustrative
    transformation_policy: generate_new
    prompt_en: "Full-bleed flat Nordic illustration of a child and sleepy cat looking at three simple dream bubbles that suggest sky, water, and garden scenes, no UI frames, no text, no numbers, no watermark."
