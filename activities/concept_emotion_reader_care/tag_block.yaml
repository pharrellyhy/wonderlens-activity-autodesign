kud:
  know:
  - The child knows the activity rule and one source-specific cue.
  understand:
  - The child understands that their action affects the next beat.
  do:
  - The child practices care through short guided turns.
progression:
  topic_axis: responsibility
  difficulty_level: 2
  next_step_hint: Repeat with a new topic while preserving the same mechanic.
  reward_hook: Saved turns reveal a source-specific payoff.
caregiver_role:
- observer
activity_signature:
  observation_angle: emotion
  mechanic: care
  entity_role: catalyst
  focal_attribute: emotion_reader
  intro: The child reads the feeling in each picture from face and body clues, then
    reflects on care after the feeling is named.
  bridge_prerequisites:
    primary:
    - emotion
    secondary:
    - function
    - state
  preview_label: Emotion Reader
  preview_prompt: Try Emotion Reader with one short guided round.
  role_pivot_note: The workbook concept supplies the play frame; a photographed object
    may only act as a catalyst.
matchability:
  entity_class_filter: []
  tier_support:
    T0: true
    T1: true
    T2: true
source_workbook_row: 12
source_concept: source_emotion_reader
response_verification:
  mode: cat1_transcript_active_cue
  evidence_source: stt_transcript
  advance_requires: active_round_target_match
  speaker_dialogue_mode: package_guided_llm
  dialogue_policy:
    mode: llm_guided_with_exact_fallback
    max_sentences: 2
    style: warm, curious, emotionally expressive, and child-facing
    semantic_target: Use the selected dialogue act as the meaning to preserve, not
      as mandatory wording.
    must:
      - Acknowledge the child's feeling word when the verifier accepts it.
      - Ask for one clear feeling read from the active picture.
      - Keep visible feeling clues in focus before any care idea.
    avoid:
      - Naming the target feeling before the child answers.
      - Naming a future picture's answer or body clue.
      - Naming specific body parts; use face and body clues only.
      - Generic praise when the answer is wrong or off-topic.
      - Explaining verifier rules or runtime behavior.
    forbidden_phrases:
      - here is the rule
      - WonderLens will
      - that's wrong
      - incorrect
  dialogue_acts:
    rule_intro:
      line: Hi, feeling detective. Let's be Emotion Readers. Each picture has a feeling to find.
    round_prompt:
      by_round:
        1:
          line: Look at the first picture. What feeling do you see?
        2:
          line: Now picture two. What feeling do you notice?
        3:
          line: Last picture. What feeling can you read here?
    correct_advance:
      by_round:
        1:
          line: "{matched_feeling} fits this picture. Let's try picture two; what feeling is there?"
        2:
          line: "{matched_feeling} fits this one. Let's look at the last picture; what feeling is there?"
        3:
          line: "{matched_feeling} fits. You read all three pictures."
    similar_advance:
      by_round:
        1:
          line: "{matched_feeling} is a good read. Let's try picture two; what feeling is there?"
        2:
          line: "{matched_feeling} is a good read. Let's look at the last picture; what feeling is there?"
        3:
          line: "{matched_feeling} is a good read. You read all three pictures."
    wrong_retry:
      by_round:
        1:
          line: Try this picture again. The face and body are clues; what feeling do you see?
        2:
          line: Try picture two again. The face and body are clues; what feeling do you notice?
        3:
          line: Try the last picture again. The face and body are clues; what feeling can you read?
    off_topic_redirect:
      by_round:
        1:
          line: Stay with this picture for a moment. What feeling do you see?
        2:
          line: Stay with picture two for a moment. What feeling do you notice?
        3:
          line: Stay with the last picture for a moment. What feeling can you read?
    idk_support:
      by_round:
        1:
          line: That's okay. Look at the face and body, then say any feeling you notice.
        2:
          line: That's okay. Look at this face and body, then say any feeling you notice.
        3:
          line: That's okay. Look at the last face and body, then say any feeling you notice.
    celebrate:
      line: You did it, feeling detective. Three feelings are saved on the board.
    closing:
      line: You watched the faces and bodies closely; that is careful feeling-reading.
  source_guard:
    source_intent: Guess or read the feeling in the active picture before discussing
      care.
    redirect_on: [idk, off_topic, generic_help_before_feeling, wrong_picture_feeling]
    redirect_behavior: If the child is unsure or off-topic, do not praise or expand
      unrelated content. Briefly return to naming the feeling in the current picture
      using face or body clues.
    disallow: [generic_advice_without_feeling, judging_the_character]
  rounds:
    - round_number: 1
      active_cue: picture 1
      target_result: worried or nervous
      accepted_feelings: [worried, nervous, scared, afraid, upset]
      success_direction: Echo the child's feeling word as a good read, then move to the next picture and ask what feeling they see. Do not name the next feeling or body clue.
      retry_direction: Return to the current picture and ask the child to look at the face and body, then name the feeling. Do not name the target feeling or body clue.
    - round_number: 2
      active_cue: picture 2
      target_result: tired or sleepy
      accepted_feelings: [sleepy, tired, worn out, sleeping]
      success_direction: Echo the child's feeling word as a good read, then move to the next picture and ask what feeling they see. Do not name the next feeling or body clue.
      retry_direction: Return to the current picture and ask the child to look at the face and body, then name the feeling. Do not name the target feeling or body clue.
    - round_number: 3
      active_cue: picture 3
      target_result: brave, nervous, unsure, or proud while trying
      accepted_feelings: [brave, nervous, unsure, proud]
      success_direction: Echo the child's feeling word as a good read, then move to the saved-feelings board.
      retry_direction: Return to the current picture and ask the child to look at the face and body, then name the feeling. Do not name the target feeling or body clue.
