version: 1
template_type: cat1
pillar: Nurture
game_style: care_station
entity: workbook_source_concept
entity_class:
- activity_concept
entity_binding: agnostic
tier_range:
  primary: T1
  span:
  - T0
  - T1
  elasticity: Can simplify language and reduce rounds for younger children.
category: cat1
attributes:
- emotion_reader
- care
key_concepts:
