# Child recap payload shape for this game.
# At runtime, {placeholders} are filled with session-specific values.
recap_payload:
  entity: "{runtime_entity}"            # e.g. ball
  tier: "{runtime_tier}"                # T0 | T1 | T2
  age_years: "{runtime_age}"

  what_we_noticed: shape
  what_we_did:     collected
  entity_role:     exemplar

  focal_attribute:
    token: "{runtime_shape}"            # e.g. round
    child_label: "{runtime_shape}"
    badge_emoji_none: true

  highlight_moment: "You found THREE {runtime_shape} things!"

  finds:
    - {label: "{find_1}", photo: "{photo_1}"}
    - {label: "{find_2}", photo: "{photo_2}"}
    - {label: "{find_3}", photo: "{photo_3}"}

  difficulty_level: 2
  next_step_hint:  "Next time, let's notice textures too"

  caregiver_observed: co-explorer
  reward_badge:       shape_quest

rendered:
  title:  "You were a Shape Quest hero today!"
  line_1: "We noticed a lot of {runtime_shape} things."
  line_2: "You collected 3 {runtime_shape} things."
  line_3: "The {runtime_entity} helped us spot {runtime_shape} in our whole world."
  badge:  "Shape Quest"
  next:   "Next time, let's notice textures too."
