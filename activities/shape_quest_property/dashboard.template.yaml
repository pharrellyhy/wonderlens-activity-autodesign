# Parent dashboard FRAGMENT produced by this game.
# This is what gets merged into the device-scoped rollup at session end.
dashboard_fragment:
  session:
    axis: form
    angle: shape
    mechanic: collect
    entity_role: exemplar
    focal_attribute: "{runtime_shape}"
    entry_rung: "{runtime_entry_rung}"
    exit_rung:  "{runtime_exit_rung}"
    outcome:    "{runtime_outcome}"         # promote | hold | demote | soft_reframe

  contributes_to:
    curiosity_radial:
      axis: form
      angle: shape                           # bumps form.by_angle.shape.sessions
    exploration_matrix:
      cell: "collect × shape"                # bumps this cell's count
    key_concepts_exposure:
      Form:
        angle: shape
    atl_skills_trail:
      - observation
      - classification
