activity_id: concept_phoneme_hunt_collect
version: 1
contract: activity_display_contract_v1
display_assets:
  - display_asset_id: first_b_treasure_prompt
    kind: cue
    label: First B treasure photo prompt
    metadata:
      target_initial_sound: b
      accepted_examples:
        - ball
        - book
        - banana
        - basket
  - display_asset_id: second_b_treasure_prompt
