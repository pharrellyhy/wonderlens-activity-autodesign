frames:
  - frame_id: step_3_round_1
    step_ref: prod.step_3.round_1
    layout_id: single_image
    display_asset_id: first_b_treasure_prompt
    control_mode: camera_capture
    input_affordance:
      select: none
      confirm: press
    verification_policy:
      type: photo_object_initial_sound
      required: true
      target:
        type: display_asset
        display_asset_id: first_b_treasure_prompt
      evidence:
        - photo_id
        - vision_object_name
        - normalized_object_name
    effect_profile:
      id: photo_sound_check
      sound_effects:
        - camera_ready
        - sound_match_chime
      lighting_effects:
        - capture_glow
        - success_ring
