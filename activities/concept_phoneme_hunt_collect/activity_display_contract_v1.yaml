activity_id: concept_phoneme_hunt_collect
version: 1
contract: activity_display_contract_v1
display_assets:
  - display_asset_id: runtime_first_letter_badge
    kind: group
    label: Runtime-selected first-letter badge
    metadata:
      selection_source: judgment_policy.accepted_first_letter
      asset_manifest_id_template: letter_badge_{letter_lower}
      available_asset_manifest_ids:
        - letter_badge_a
        - letter_badge_b
        - letter_badge_c
        - letter_badge_d
        - letter_badge_e
        - letter_badge_f
        - letter_badge_g
        - letter_badge_h
        - letter_badge_i
        - letter_badge_j
        - letter_badge_k
