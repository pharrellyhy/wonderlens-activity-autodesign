        - letter_badge_m
        - letter_badge_n
        - letter_badge_o
        - letter_badge_p
        - letter_badge_q
        - letter_badge_r
        - letter_badge_s
        - letter_badge_t
        - letter_badge_u
        - letter_badge_v
        - letter_badge_w
        - letter_badge_x
        - letter_badge_y
        - letter_badge_z
frames:
  - frame_id: step_3_round_1
    step_ref: prod.step_2.round_1
    layout_id: single_image
    display_asset_id: runtime_first_letter_badge
    control_mode: camera_capture
    input_affordance:
      select: none
      confirm: press
    verification_policy:
      type: photo_object_first_letter
      required: true
      target:
        type: display_asset
        display_asset_id: runtime_first_letter_badge
      evidence:
        - photo_id
        - vision_object_name
        - normalized_object_name
        - saved_first_letter
    effect_profile:
      id: photo_sound_check
      sound_effects:
        - camera_ready
        - sound_match_chime
      lighting_effects:
        - capture_glow
        - success_ring
      haptic_feedback:
        - capture_pulse
        - confirm_pulse
