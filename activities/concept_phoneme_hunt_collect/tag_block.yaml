transdisciplinary_theme: How We Express Ourselves
kud:
  know:
  - The child knows the activity rule and one source-specific cue.
  understand:
  - The child understands that their action affects the next beat.
  do:
  - The child practices collect through short guided turns.
progression:
  topic_axis: connection
  difficulty_level: 2
  next_step_hint: Repeat with a new topic while preserving the same mechanic.
  reward_hook: Saved turns reveal a source-specific payoff.
caregiver_role:
- scaffold
- observer
activity_signature:
  observation_angle: function
  mechanic: collect
  entity_role: exemplar
  focal_attribute: recognized_name_first_letter
  intro: The child takes one seed photo so vision can recognize and normalize the
    object name, then runtime uses that first starting character for the rest of
    the hunt.
  bridge_prerequisites:
    primary:
    - function
    secondary:
    - object_name
    - photo_evidence
    - connection
  preview_label: Letter Treasure Hunt
  preview_prompt: Find three objects whose recognized names start with the same first
    letter.
  role_pivot_note: The workbook concept supplies the play frame; a photographed object
    may only act as a catalyst.
matchability:
  entity_class_filter: []
  tier_support:
    T0: true
    T1: true
    T2: true
source_workbook_row: 2
source_concept: source_phoneme_hunt
runtime_judgment_contract:
  mode: recognized_object_first_letter
  input_action: capture_photo
  seed_source: first_in_activity_photo
  name_normalization: simple_object_noun
  reject_adjective_heavy_labels: true
  preserve_saved_target_letter: true
  wrong_photo_action: capture_photo
  correct_photo_action: capture_photo_until_collection_complete
  dialogue_contract:
    type: first_letter_photo_collection
    transitions:
      seed_retry:
        intent: Ask for one clearer seed photo when no object name or target letter is available.
        fallback: I need one clear object name. Take one clear photo.
        max_sentences: 2
      seed_to_next:
        intent: Name the seed object and saved starting letter, then ask for another photo with the same starting letter.
        fallback: "{object_name} starts with {target_letter}. Take another photo that starts with {target_letter}."
        max_sentences: 2
      correct_to_next:
        intent: Name the matching object and ask for one more photo with the saved starting letter.
        fallback: "{object_name} also starts with {target_letter}. Take one more photo that starts with {target_letter}."
        max_sentences: 2
      retry_wrong_photo:
        intent: Explain the photographed object's starting letter mismatch and ask the child to take another photo with the saved starting letter.
        fallback: "{object_name} starts with {object_letter}, not {target_letter}. Try another photo that starts with {target_letter}."
        max_sentences: 2
      retry_unclear_photo:
        intent: Ask for a clearer photo that starts with the saved target letter.
        fallback: I need one clear object name. Try another photo that starts with {target_letter}.
        max_sentences: 2
      correct_to_finish:
        intent: Name the collected objects and say they all share the saved starting letter.
        fallback: "{object_names} all start with {target_letter}. Same starting letter."
        max_sentences: 2
