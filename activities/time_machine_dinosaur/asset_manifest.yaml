activity_id: time_machine_dinosaur
entity_id: dinosaur
version: 1
style_id: wonderlens_device_mint_soft_3d
palette:
  shell: warm porcelain off-white
  screen: green-tinted near black
  primary_accent: soft mint green
  secondary_accent: pale sage
  shadow: cool gray green
screen_targets:
  round_device_screen:
    aspect_ratio: "1:1"
    crop_shape: circle
    master_size: 512
    safe_area: central 72 percent circle
assets:
  - id: activity_icon
    role: activity_preview
    label: Time Machine Dinosaur activity icon
    requiredness: required
    accuracy_mode: illustrative
    source_strategy: generated_illustrative
    transformation_policy: generate_new
    prompt_en: "Flat Nordic children's illustration of a friendly toy dinosaur beside a simple time swirl and tiny fern, clean white background, restrained boho pastels, no text, no numbers, no watermark."
    variants:
      - id: round_512
        target: round_device_screen
        size: 512x512
        path: assets/activity_icon__round_512.png
    fallback_behavior: Show the Time Traveler title and keep the photographed dinosaur as the visual anchor.
  - id: intro_scene
    role: story_scene
    label: Dinosaur introduction scene
    requiredness: required
    accuracy_mode: illustrative
    source_strategy: generated_illustrative
    transformation_policy: generate_new
    prompt_en: "Full-bleed flat Nordic nursery scene of a friendly toy dinosaur on the floor while a child notices its strong legs and big shape, warm quiet setting, no text, no numbers, no watermark."
    variants:
      - id: round_512
        target: round_device_screen
        size: 512x512
        path: assets/intro_scene__round_512.png
    fallback_behavior: Keep the photographed dinosaur centered and introduce the time traveler role by voice.
  - id: rules_scene
    role: story_scene
    label: Time machine rules scene
    requiredness: required
    accuracy_mode: illustrative
    source_strategy: generated_illustrative
    transformation_policy: generate_new
    prompt_en: "Full-bleed flat Nordic scene of a toy dinosaur and child looking toward three gentle time portals for jungle, volcano, and lake, no UI frame, no text, no numbers, no watermark."
